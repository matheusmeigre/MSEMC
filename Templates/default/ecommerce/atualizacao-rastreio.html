<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atualização de Rastreio</title>
  <style>
    body{background:#f4f6f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;margin:0;padding:0}
    .wrapper{max-width:600px;margin:32px auto;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08)}
    .header{background:#1e40af;padding:28px 32px;text-align:center;color:#fff;font-size:18px;font-weight:600}
    .body{padding:36px 32px;color:#374151;font-size:15px;line-height:1.7}
    .body h1{font-size:22px;font-weight:700;color:#111827;margin-bottom:16px}
    .body p{margin-bottom:14px}
    .status-badge{text-align:center;padding:20px;background:#eff6ff;border-radius:8px;margin:18px 0}
    .status-badge .icon{font-size:36px}
    .status-badge .status-text{font-size:20px;font-weight:700;color:#1e40af;margin-top:8px}
    .info-grid{background:#f9fafb;border-radius:8px;padding:18px;margin:18px 0;font-size:14px}
    .info-grid .row{padding:6px 0;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between}
    .info-grid .row:last-child{border-bottom:none}
    .label{color:#6b7280}.value{color:#111827;font-weight:600}
    .btn{display:inline-block;margin:20px 0;padding:13px 28px;background:#1e40af;color:#fff!important;text-decoration:none;border-radius:6px;font-size:15px;font-weight:600}
    .footer{background:#f9fafb;padding:20px 32px;text-align:center;font-size:12px;color:#9ca3af;border-top:1px solid #e5e7eb}
    .footer a{color:#6b7280}
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">🚚 Atualização de Rastreio</div>
    <div class="body">
      <h1>Olá, {{ nomeCliente }}!</h1>
      <p>Seu pedido teve uma atualização de status:</p>
      <div class="status-badge">
        <div class="icon">🚚</div>
        <div class="status-text">{{ statusEnvio }}</div>
      </div>
      <div class="info-grid">
        <div class="row"><span class="label">Pedido</span><span class="value">#{{ numeroPedido }}</span></div>
        <div class="row"><span class="label">Código de Rastreio</span><span class="value">{{ codigoRastreio }}</span></div>
      </div>
      {{ if urlRastreio }}
      <div style="text-align:center">
        <a href="{{ urlRastreio }}" class="btn">Rastrear Pedido →</a>
      </div>
      {{ end }}
    </div>
    <div class="footer">
      <p>Dúvidas? <a href="#">Fale com o suporte</a>.</p>
      <p><a href="#">Política de Privacidade</a></p>
    </div>
  </div>
</body>
</html>
