<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ titulo }}</title>
  <style>
    body{background:#f4f6f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;margin:0;padding:0}
    .wrapper{max-width:600px;margin:32px auto;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08)}
    .header{background:#1a1a2e;padding:28px 32px;text-align:center;color:#fff;font-size:18px;font-weight:600}
    .body{padding:36px 32px;color:#374151;font-size:15px;line-height:1.7}
    .body h1{font-size:24px;font-weight:700;color:#111827;margin-bottom:16px}
    .body p{margin-bottom:14px}
    .content-block{margin:20px 0;color:#374151;font-size:15px;line-height:1.8}
    .btn{display:inline-block;margin:20px 0;padding:13px 28px;background:#4f46e5;color:#fff!important;text-decoration:none;border-radius:6px;font-size:15px;font-weight:600}
    .divider{height:1px;background:#e5e7eb;margin:24px 0}
    .footer{background:#f9fafb;padding:20px 32px;text-align:center;font-size:12px;color:#9ca3af;border-top:1px solid #e5e7eb}
    .footer a{color:#6b7280}
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">{{ titulo }}</div>
    <div class="body">
      <h1>{{ titulo }}</h1>
      <div class="content-block">{{ conteudo }}</div>
      {{ if ctaUrl }}
      <div class="divider"></div>
      <div style="text-align:center">
        <a href="{{ ctaUrl }}" class="btn">{{ ctaTexto ?? "Saiba mais" }}</a>
      </div>
      {{ end }}
    </div>
    <div class="footer">
      <p>© 2026 {{ nomeEmpresa ?? "MSEMC" }}. Todos os direitos reservados.</p>
      <p><a href="#">Cancelar inscrição</a> · <a href="#">Política de Privacidade</a></p>
    </div>
  </div>
</body>
</html>
