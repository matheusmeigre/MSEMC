name: MSEMC Secure Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Cache NuGet para acelerar o pipeline
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # Auditoria de vulnerabilidades nas dependências
      - name: Security Audit
        run: dotnet list package --vulnerable || true

      - name: Restore dependencies
        run: dotnet restore

      # Analyzers habilitados direto no build, sem step separado
      - name: Build
        run: dotnet build --no-restore --configuration Release /p:EnableNETAnalyzers=true

      - name: Run Tests
        run: dotnet test --no-restore --no-build --configuration Release --verbosity normal

      - name: Publish
        run: dotnet publish --no-restore --no-build --configuration Release -o out

      # Deploy — substitua pelo step real (Render, Railway, Azure, etc.)
      - name: Deploy
        env:
          Smtp__Username: ${{ secrets.SMTP_USERNAME }}
          Smtp__Password: ${{ secrets.SMTP_PASSWORD }}
          Smtp__SenderEmail: ${{ secrets.SMTP_SENDER_EMAIL }}
          ApiKey__Key: ${{ secrets.API_KEY }}
          RabbitMq__Host: ${{ secrets.RABBITMQ_HOST }}
          RabbitMq__Username: ${{ secrets.RABBITMQ_USERNAME }}
          RabbitMq__Password: ${{ secrets.RABBITMQ_PASSWORD }}
        run: echo "Conecte aqui com Render, Railway ou Azure"
